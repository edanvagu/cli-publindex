name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
      - run: npm run build:bundle
      - name: Package binary
        run: npx pkg dist/publindex.js --targets node20-win-x64 --output dist/publindex-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: publindex-windows-x64.exe
          path: dist/publindex-windows-x64.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Publindex CLI ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            artifacts/*
