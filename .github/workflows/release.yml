name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:bin:win
            artifact: publindex-windows-x64.exe
            zip: false
          - os: macos-14
            script: build:bin:mac-arm64
            artifact: publindex-macos-arm64
            zip: true
          - os: macos-13
            script: build:bin:mac-x64
            artifact: publindex-macos-x64
            zip: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm test
      - run: npm run ${{ matrix.script }}
      - if: matrix.zip
        shell: bash
        run: |
          chmod +x "dist/${{ matrix.artifact }}"
          cd dist && zip "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.zip && '.zip' || '' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Publindex CLI ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.md \
            artifacts/*
